        <?php
    if ($_SERVER["REQUEST_METHOD"] == "POST") {
        $num1 = $_POST["num1"];
        $num2 = $_POST["num2"];
        $operacion = $_POST["operacion"];
        $resultado = 0;

        if ($operacion == "sumar") {
            $resultado = $num1 + $num2;
        } elseif ($operacion == "restar") {
            $resultado = $num1 - $num2;
        }

        echo "<div class='resultado'>Resultado: $resultado</div>";
    }
